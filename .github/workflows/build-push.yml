name: Build & push dino-worker image

# Builds the dino-worker image on GitHub's hosted runners and pushes it to GHCR.
# server.home never builds — it pulls ghcr.io/<owner>/gpu-share-dino:latest.
# Watchtower auto-updates on a 5-minute poll (no label needed — watch-all).
on:
  push:
    branches: [main]
    paths:
      - 'dino-worker/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner (GHCR requires lowercase)
        run: echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dino-worker
        uses: docker/build-push-action@v5
        with:
          context: ./dino-worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/gpu-share-dino:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/gpu-share-dino:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
